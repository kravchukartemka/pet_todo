version: "3.9"

services:

  db:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:

    build: .

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  postgres_data: